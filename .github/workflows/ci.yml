name: Full CI Pipeline
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Simulate build
        run: |
          echo "Building application..."
          mkdir -p dist
          echo "version=1.0.0" > dist/build.txt
          cat dist/build.txt
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Simulate tests
        run: |
          echo "Running tests..."
          echo "Test 1: OK"
          echo "Test 2: OK"
          echo "Test 3: OK"
          echo "All tests passed"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Simulate deploy
        run: |
          echo "Deploying application..."
          echo "Connecting to server..."
          echo "Deploy completed successfully"
