services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mi-base
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "8083:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres-data:
